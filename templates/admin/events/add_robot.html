{% extends "admin/base.html" %}
{% import "admin/partials/macros.html" as admin %}

{% block admin_content %}
<section>
    <a href="/admin/events/{{ event.id }}" class="btn btn-sm btn-secondary admin-back-link">&larr; Event</a>
    {% include "admin/partials/alerts.html" %}

    {% call admin.card('Add Robot Manually') %}
    <form method="post" action="/admin/events/{{ event.id }}/robots/add">
        <div class="form-group">
            <label for="roboteer_name">Roboteer Name</label>
            <input type="text" id="roboteer_name" name="roboteer_name" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="robot_name">Robot Name</label>
            <input type="text" id="robot_name" name="robot_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="weapon_type">Weapon Type (optional)</label>
            <input type="text" id="weapon_type" name="weapon_type" class="form-control" placeholder="e.g. Spinner, Wedge...">
        </div>
        <div class="form-group">
            <label for="contact_email">Contact Email (optional)</label>
            <input type="email" id="contact_email" name="contact_email" class="form-control">
        </div>
        <div class="form-group">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" name="is_reserve" value="1">
                <span>Designate as reserve</span>
            </label>
        </div>
        <div class="admin-form-actions">
            <button type="submit" class="btn btn-primary">Add to Roster</button>
            <a href="/admin/events/{{ event.id }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    {% endcall %}
</section>
{% endblock %}
