{% extends "admin/base.html" %}
{% import "admin/partials/macros.html" as admin %}

{% block admin_content %}
<section>
    <a href="/admin/" class="btn btn-sm btn-secondary admin-back-link">&larr; Dashboard</a>
    <h1>New Event</h1>
    {% include "admin/partials/alerts.html" %}
    {% call admin.card() %}
    <form method="post" action="/admin/events">
        <div class="form-group">
            <label for="event_name">Event Name</label>
            <input
                type="text"
                id="event_name"
                name="event_name"
                class="form-control"
                placeholder="e.g. Steel City Smashdown 2026"
                required
                autofocus
            >
        </div>
        <div class="form-group">
            <label for="weight_class">Weight Class</label>
            <input
                type="text"
                id="weight_class"
                name="weight_class"
                class="form-control"
                placeholder="e.g. Beetleweight (150g)"
                required
            >
        </div>
        <div class="form-group">
            <label for="google_sheet_url">Google Sheet URL (optional - can be set later)</label>
            <input
                type="url"
                id="google_sheet_url"
                name="google_sheet_url"
                class="form-control"
                placeholder="https://docs.google.com/spreadsheets/d/..."
            >
        </div>
        <div class="admin-form-actions">
            <button type="submit" class="btn btn-primary">Create Event</button>
            <a href="/admin/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    {% endcall %}
</section>
{% endblock %}
