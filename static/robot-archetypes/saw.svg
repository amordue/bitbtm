<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Blueprint illustration of a saw combat robot">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2340"/>
      <stop offset="55%" stop-color="#0f3458"/>
      <stop offset="100%" stop-color="#08182d"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#01070f" stop-opacity="0.46"/>
    </radialGradient>
    <pattern id="grid-major" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" fill="none" stroke="#8fe7ff" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
    <pattern id="grid-minor" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#8fe7ff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="body-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#133b63" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0d2744" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="weapon-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d658f" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#10324e" stop-opacity="0.78"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg-gradient)"/>
  <rect width="1200" height="900" fill="url(#grid-minor)"/>
  <rect width="1200" height="900" fill="url(#grid-major)"/>

